backend:
  name: git-gateway
  branch: main

# Where new image uploads go
media_folder: "uploads"
public_folder: "/uploads"

# Branch + PR workflow off (publish straight to live)
publish_mode: simple

site_url: https://zillionslandscaping.com
display_url: https://zillionslandscaping.com
logo_url: https://zillionslandscaping.com/images/hero.jpg

collections:
  # =========================================================
  # PATIO MAINTENANCE — Before/After carousel + Linux
  # =========================================================
  - name: maintenance
    label: "Patio Maintenance (Before/After)"
    files:
      - file: "content/_data/maintenance.json"
        label: "Before / After Carousel"
        name: "maintenance"
        fields:
          - { name: headline, label: "Section Headline", widget: string, default: "Bring your patio back." }
          - { name: subhead,  label: "Section Subhead",  widget: text,   default: "Pressure wash and fresh polymer sand. Recommended every 2 to 3 years." }
          - name: pairs
            label: "Before / After Pairs"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title,   label: "Title",   widget: string }
              - { name: before,  label: "Before Photo", widget: image }
              - { name: after,   label: "After Photo",  widget: image }
              - { name: caption, label: "Caption", widget: string, required: false }
          - name: supervisor
            label: "Site Supervisor (Linux) Card"
            widget: object
            required: false
            fields:
              - { name: image,   label: "Photo",   widget: image,  required: false }
              - { name: title,   label: "Title",   widget: string, default: "Linux — Site Supervisor" }
              - { name: caption, label: "Caption", widget: string, default: "On every job. Approves all paver work." }

  # =========================================================
  # FENCES & GATES grid
  # =========================================================
  - name: fences
    label: "Fences & Gates"
    files:
      - file: "content/_data/fences.json"
        label: "Fence & Gate Photos"
        name: "fences"
        fields:
          - { name: headline, label: "Section Headline", widget: string, default: "Vinyl. Wood. Gates. Built to last." }
          - { name: subhead,  label: "Section Subhead",  widget: text,   default: "Privacy panels, custom gates, fence repair and replacement." }
          - name: items
            label: "Photos"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: image,   label: "Photo",   widget: image }
              - { name: title,   label: "Title",   widget: string }
              - { name: caption, label: "Caption", widget: string, required: false }

  # =========================================================
  # PLANTINGS — In The Beds grid
  # =========================================================
  - name: plantings
    label: "Plantings (In The Beds)"
    files:
      - file: "content/_data/plantings.json"
        label: "Planting Photos"
        name: "plantings"
        fields:
          - { name: headline, label: "Section Headline", widget: string, default: "What we planted. What's coming back." }
          - { name: subhead,  label: "Section Subhead",  widget: text,   default: "Fresh installs and the beds we keep an eye on through the season." }
          - name: items
            label: "Photos"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: image,   label: "Photo",   widget: image }
              - { name: title,   label: "Title",   widget: string }
              - { name: caption, label: "Caption", widget: string, required: false }

  # =========================================================
  # SITE SETTINGS — phone, email, hours, hero text
  # =========================================================
  - name: settings
    label: "Site Settings"
    files:
      - file: "content/_data/site.json"
        label: "General Info"
        name: "general"
        format: "json"
        fields:
          - { name: business_name, label: "Business Name", widget: string }
          - { name: logo, label: "Logo (transparent PNG works best)", widget: image, required: false, hint: "Replaces the green circle icon next to the name in the header" }
          - { name: logo_height, label: "Logo Height (px)", widget: number, default: 36, required: false, hint: "36 = small icon. 48 = medium. 64 = large." }
          - { name: hide_text_logo, label: "Hide text next to logo?", widget: boolean, default: false, required: false, hint: "Turn ON if your logo image already contains the business name" }
          - { name: hero_image, label: "Hero Background Photo", widget: image, required: false, hint: "The big photo behind the hero text. Leave blank to use the default." }
          - { name: brand_color, label: "Brand Color (hex, e.g. #2f5233)", widget: string, default: "#2f5233", required: false }
          - { name: tagline, label: "Tagline (under hero title)", widget: string }
          - { name: hero_title, label: "Hero Title", widget: string }
          - { name: hero_subtitle, label: "Hero Subtitle", widget: text }
          - { name: phone, label: "Phone (leave blank to hide)", widget: string, required: false }
          - { name: email, label: "Email (leave blank to hide)", widget: string, required: false }
          - { name: hours, label: "Business Hours", widget: string, default: "Mon–Sat · 7am–6pm" }
          - { name: service_area, label: "Service Area Text", widget: string, default: "Charlotte, NC and surrounding areas" }
          - { name: hero_verse, label: "Hero Verse", widget: string, default: "“The earth is the Lord’s, and everything in it.” — Psalm 24:1" }
          - { name: about_verse, label: "About Verse", widget: string, default: "“Whatever you do, work at it with all your heart, as working for the Lord.” — Colossians 3:23" }

  # =========================================================
  # GALLERY — drag photos from phone, add caption
  # =========================================================
  - name: gallery
    label: "Gallery (Project Photos)"
    label_singular: "Photo"
    folder: "content/gallery"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    fields:
      - { name: title, label: "Caption / Title", widget: string }
      - { name: image, label: "Photo", widget: image }
      - { name: date, label: "Date", widget: datetime, default: "" }
      - { name: featured, label: "Show on homepage?", widget: boolean, default: true }
      - { name: description, label: "Optional Description", widget: text, required: false }

  # =========================================================
  # VIDEOS — hyperlapses, project walkthroughs
  # =========================================================
  - name: videos
    label: "Videos (Hyperlapses & Walkthroughs)"
    label_singular: "Video"
    folder: "content/videos"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    summary: "{{title}} — {{date}}"
    fields:
      - { name: title, label: "Caption / Title", widget: string }
      - name: source
        label: "Where is the video hosted?"
        widget: select
        options: ["YouTube", "Vimeo", "Facebook", "Direct Upload"]
        default: "YouTube"
        hint: "YouTube is recommended — free, fast, no bandwidth limits."
      - { name: youtube_id, label: "YouTube Video ID (the part after watch?v=)", widget: string, required: false, hint: "Example: from https://youtube.com/watch?v=dQw4w9WgXcQ paste dQw4w9WgXcQ" }
      - { name: facebook_url, label: "Facebook Video URL", widget: string, required: false, hint: "Full URL to the Facebook video or share link. Renders a 'Watch on Facebook' card that opens in a new tab." }
      - name: orientation
        label: "Video Orientation"
        widget: select
        options: ["Landscape (16:9)", "Portrait / Short (9:16)", "Square (1:1)"]
        default: "Landscape (16:9)"
        hint: "YouTube Shorts and TikToks are Portrait. Regular YouTube videos are Landscape."
      - { name: vimeo_id, label: "Vimeo Video ID", widget: string, required: false, hint: "The numbers at the end of the Vimeo URL" }
      - { name: video_file, label: "Upload Video File (MP4)", widget: file, required: false, hint: "Only use if NOT on YouTube/Vimeo. Keep under 50MB. Use a free converter if needed." }
      - { name: poster, label: "Thumbnail / Poster Image", widget: image, required: false, hint: "Screenshot of best frame. If blank, YouTube/Vimeo provides one automatically." }
      - { name: date, label: "Date", widget: datetime, default: "" }
      - { name: featured, label: "Show on homepage?", widget: boolean, default: true }
      - { name: description, label: "Optional Description", widget: text, required: false }

  # =========================================================
  # SERVICES — edit the 6 service cards
  # =========================================================
  - name: services
    label: "Services"
    label_singular: "Service"
    folder: "content/services"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { name: title, label: "Service Name", widget: string }
      - { name: description, label: "Short Description", widget: text }
      - { name: order, label: "Sort Order (1 = first)", widget: number, default: 1 }

  # =========================================================
  # POSTS — updates / blog
  # =========================================================
  - name: posts
    label: "Updates / Posts"
    label_singular: "Post"
    folder: "content/posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: date, label: "Date", widget: datetime }
      - { name: image, label: "Cover Image", widget: image, required: false }
      - { name: body, label: "Body", widget: markdown }
